# fly.toml file for deploying to Fly.io
app = "collab-builder"

[build]
  builder = "heroku/buildpacks:20"

[env]
  PORT = "8080"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 443

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
